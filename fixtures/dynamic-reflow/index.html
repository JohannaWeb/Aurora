<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Aurora dynamic reflow fixture</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="page">
      <h1>dynamic reflow</h1>
      <section id="status" class="status">waiting for frame task</section>
    </main>
    <script>
      setTimeout(() => {
        const status = document.getElementById("status");
        status.className = "status ready";
        status.style.width = "620px";
        status.textContent = "timer updated the DOM";

        queueMicrotask(() => {
          const detail = document.createElement("p");
          detail.className = "detail";
          detail.textContent = "microtask appended this line before screenshot paint";
          document.querySelector(".page").appendChild(detail);
        });
      }, 0);
    </script>
  </body>
</html>
